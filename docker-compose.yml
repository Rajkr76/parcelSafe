version: '3.8'

services:
  backend:
    build: ./backend
    container_name: parcelsafe-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/firebase-service-account.json:/app/firebase-service-account.json:ro
    networks:
      - parcelsafe

  nginx:
    image: nginx:alpine
    container_name: parcelsafe-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - parcelsafe

networks:
  parcelsafe:
    driver: bridge
